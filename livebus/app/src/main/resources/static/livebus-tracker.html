<!DOCTYPE html>
<html>
<head>
    <title>LiveBus Real-Time Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 600px; }
        input { padding: 10px; width: 300px; margin-right: 10px; }
        button { padding: 10px 15px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 4px; }
        .danger { background-color: #dc3545; }
        #messages { margin-top: 20px; background: #222; color: #0f0; padding: 15px; border-radius: 4px; height: 300px; overflow-y: scroll; font-family: monospace;}
    </style>
</head>
<body>

    <div class="card">
        <h2>🚍 Passenger Live Tracker</h2>
        <p>Enter the Route ID you want to track:</p>
        <input type="text" id="routeId" placeholder="e.g. fd4d4858-b281-4d1b-a511-bcc189de2398">
        <button onclick="connect()">Start Tracking</button>
        <button class="danger" onclick="disconnect()">Stop</button>

        <div id="messages">Waiting for GPS pings...<br></div>
    </div>

    <script>
        let stompClient = null;

        function connect() {
            const routeId = document.getElementById('routeId').value;
            if (!routeId) {
                alert("Please enter a Route ID!");
                return;
            }

            // Connect to the Spring Boot endpoint you configured
            const socket = new SockJS('/ws-livebus');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function (frame) {
                logMessage("Connected to Server: " + frame);
                
                // Subscribe to the specific route's topic
                const topic = '/topic/routes/' + routeId;
                logMessage("Subscribed to: " + topic);
                
                stompClient.subscribe(topic, function (message) {
                    // This runs every time the server broadcasts a message!
                    logMessage("📍 LIVE UPDATE: " + message.body);
                });
            }, function(error) {
                logMessage("❌ Connection Error: " + error);
            });
        }

        function disconnect() {
            if (stompClient !== null) {
                stompClient.disconnect();
                logMessage("Disconnected from tracking.");
            }
        }

        function logMessage(message) {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML += message + "<br><br>";
            messagesDiv.scrollTop = messagesDiv.scrollHeight; // Auto-scroll to bottom
        }
    </script>
</body>
</html>
